name: Import Live D1 Window

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

concurrency:
  group: import-live-d1
  cancel-in-progress: true

jobs:
  import-live-d1:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      D1_API_URL: https://worldcup-predictor-api.wu1du2.workers.dev
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ea85b9ad1849253605db55f73ad3be98

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Cloudflare D1 access
        run: |
          test -n "$CLOUDFLARE_API_TOKEN"
          npx wrangler@4.106.0 d1 execute worldcup-predictor --remote --command "select 1 as ok;"

      - name: Generate live import SQL
        run: npm run import:live:d1

      - name: Apply live import SQL
        if: hashFiles('output/d1-live-import.sql') != ''
        run: npx wrangler@4.106.0 d1 execute worldcup-predictor --remote --file output/d1-live-import.sql

      - name: No live changes
        if: hashFiles('output/d1-live-import.sql') == ''
        run: echo "Live D1 window unchanged; no write."
