name: Import Sporttery Odds

on:
  workflow_dispatch:
  schedule:
    - cron: '43 * * * *'

concurrency:
  group: import-odds
  cancel-in-progress: false

jobs:
  import-odds:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Odds import paused
        run: |
          echo "Sporttery odds import is paused to reduce Supabase egress."
          echo "This workflow intentionally does not write Supabase."
