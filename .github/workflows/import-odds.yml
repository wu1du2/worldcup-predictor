name: Import Sporttery Odds

on:
  workflow_dispatch:
  schedule:
    - cron: '43 * * * *'

concurrency:
  group: import-odds
  cancel-in-progress: false

jobs:
  import-odds:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Import odds
        run: npm run import:odds

      - name: Report workflow failure
        if: failure()
        run: node scripts/reportActionFailure.mjs --job=odds --message="Odds workflow failed before import completed."
