name: Import World Cup Matches

on:
  workflow_dispatch:
  schedule:
    - cron: '17 * * * *'

jobs:
  import-matches:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Import matches
        run: npm run import:matches

      - name: Report workflow failure
        if: failure()
        run: node scripts/reportActionFailure.mjs --job=matches --message="Matches workflow failed before import completed."
